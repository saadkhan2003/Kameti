name: Auto Release (Android APK)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.0"
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=${{ github.workspace }}/android/app/upload-keystore.jks" >> android/key.properties

      - name: Build Android APK
        run: flutter build apk --release

      - name: Compute release metadata
        id: release_meta
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          fi

          RELEASE_NAME="Kameti ${TAG_NAME}"

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from recent commits
        id: release_notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '1p')

          if [[ -n "$PREV_TAG" ]]; then
            COMMITS=$(git log --no-merges --pretty=format:'- %s (%h)' "$PREV_TAG"..HEAD | head -n 25)
          else
            COMMITS=$(git log --no-merges --pretty=format:'- %s (%h)' -n 25)
          fi

          if [[ -z "$COMMITS" ]]; then
            COMMITS='- Maintenance updates and stability improvements.'
          fi

          {
            echo "notes<<EOF"
            echo "## Release Highlights"
            echo
            echo "Automated release generated by GitHub Actions."
            echo
            echo "## Recent Changes"
            echo "$COMMITS"
            echo
            echo "## Build Info"
            echo "- Commit: ${{ steps.release_meta.outputs.short_sha }}"
            echo "- Workflow: #${GITHUB_RUN_NUMBER}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
